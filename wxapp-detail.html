<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>小程序改稿 · 详情 · MSC.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wxapp.css">
</head>
<body data-wxapp-page="detail">

<main class="wp-main">
  <div class="wp-page-head" style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;">
    <div style="flex:1;min-width:200px;">
      <h1 id="wp-title">…</h1>
      <p id="wp-screen"></p>
    </div>
    <div class="wp-device-toggle" style="display:flex;gap:4px;">
      <button class="wp-chip active" data-device-toggle="both">双设备</button>
      <button class="wp-chip" data-device-toggle="ios">仅 iOS</button>
      <button class="wp-chip" data-device-toggle="android">仅 Android</button>
    </div>
  </div>

  <div id="wp-detail-root" class="wp-detail">
    <!-- 左：截图带 + 画布工具栏 + 双画布 -->
    <div class="wp-stage">
      <!-- 截图带 · 任何角色都能上传辅助截图 -->
      <div class="wp-screenshots-strip" id="wp-screenshots-strip">
        <div class="wp-screenshots-list" id="wp-screenshots-list"></div>
        <label class="wp-screenshot-upload" id="wp-screenshot-upload-label" title="上传辅助截图（最大 500KB）">
          <input type="file" id="wp-screenshot-input" accept="image/*" hidden>
          <span class="wp-up-icon">＋</span>
          <span>上传截图</span>
        </label>
      </div>

      <!-- 画布工具栏 · 精简版 -->
      <div class="wp-stage-tools">
        <button class="wp-tool" data-tool="freehand" title="自由画笔">✏️</button>
        <button class="wp-tool" data-tool="circle"   title="圆圈">⭕</button>
        <button class="wp-tool" data-tool="arrow"    title="箭头">➤</button>
        <button class="wp-tool" data-tool="rect"     title="矩形">▭</button>
        <span class="wp-tool-hint">选工具 → 拖拽 → 输入文本 → 工具自动停用</span>
      </div>

      <div class="wp-canvases">
        <div class="wp-canvas-wrap" id="wp-wrap-ios">
          <div class="wp-canvas-label">iOS · 375×812</div>
          <div class="wp-canvas device-ios" id="wp-canvas-ios" data-device="ios">
            <div class="wp-host" id="wp-host-ios"></div>
          </div>
        </div>
        <div class="wp-canvas-wrap" id="wp-wrap-android">
          <div class="wp-canvas-label">Android · 360×800</div>
          <div class="wp-canvas device-android" id="wp-canvas-android" data-device="android">
            <div class="wp-host" id="wp-host-android"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右：状态筛选 → 反馈流 → 改稿理由 → 编辑改稿 → 元信息 → 修订历史 -->
    <aside class="wp-side">
      <!-- 1. 状态筛选 (同时是过滤器) -->
      <section class="wp-panel">
        <h3>状态 <span class="wp-hint">点击切换 · 过滤反馈流和画布</span></h3>
        <div id="wp-status-filter" class="wp-status-filter"></div>
      </section>

      <!-- 2. 反馈流 (annotation 卡 + 嵌套回复) -->
      <section class="wp-panel">
        <h3>反馈流</h3>
        <div id="wp-feedback-stream" class="wp-feedback-stream"></div>

        <!-- 全局评论（不挂在任何 annotation 上） -->
        <div class="wp-comment-compose">
          <textarea id="wp-comment-body" placeholder="写一条全局评论（针对整张改稿，不针对具体反馈）..."></textarea>
          <div class="wp-comment-compose-mini">
            <select id="wp-comment-kind">
              <option value="note">💭 笔记</option>
              <option value="approve">✅ 采纳</option>
              <option value="reject">❌ 拒绝</option>
              <option value="block">⛔ 阻塞</option>
              <option value="idea">💡 想法</option>
            </select>
            <button id="wp-comment-submit" class="wp-btn-primary">发布</button>
          </div>
        </div>
      </section>

      <!-- 3. 改稿理由 (折叠) -->
      <details class="wp-panel" open>
        <summary><h3>改稿理由</h3></summary>
        <div id="wp-rationale" class="wp-rationale"></div>
      </details>

      <!-- 4. 编辑改稿 (折叠 · 工具栏里删掉的编辑入口搬到这里) -->
      <details class="wp-panel">
        <summary><h3>编辑改稿内容</h3></summary>
        <div class="wp-edit-buttons">
          <button id="wp-edit-html">编辑 HTML</button>
          <button id="wp-edit-css">编辑 CSS</button>
          <button id="wp-edit-rationale">编辑改稿理由</button>
        </div>
      </details>

      <!-- 5. 元信息 (默认折叠) -->
      <details class="wp-panel">
        <summary><h3>元信息</h3></summary>
        <div id="wp-meta"></div>
      </details>

      <!-- 6. 修订历史 (折叠) -->
      <details class="wp-panel">
        <summary><h3>修订历史</h3></summary>
        <div id="wp-revisions-list" class="wp-revisions-list"></div>
      </details>
    </aside>
  </div>
</main>

<script src="wxapp.js"></script>
</body>
</html>
