<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>决策面板 · MSC.AI</title>
<style>
:root{--bg:#0D0F14;--bg2:#161922;--bg3:#1C1F2B;--bg4:#1E2130;--brd:#2A2D3A;--text:#E8E9ED;--text2:#9CA0B0;--text3:#6B7084;--accent:#6C5CE7;--accent-l:#A29BFE;--green:#00B894;--green-bg:rgba(0,184,148,.12);--amber:#FDCB6E;--amber-bg:rgba(253,203,110,.12);--red:#FF6B6B;--red-bg:rgba(255,107,107,.12);--blue:#74B9FF;--blue-bg:rgba(116,185,255,.12)}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',sans-serif;line-height:1.7;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:rgba(13,15,20,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--brd);padding:14px 20px;display:flex;align-items:center;gap:12px}
.header h1{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.header .badge{font-size:11px;padding:3px 10px;background:rgba(0,184,148,.12);color:var(--green);border:1px solid rgba(0,184,148,.25);border-radius:20px}

.main{max-width:960px;margin:0 auto;padding:24px 16px 80px}

.intro{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:18px 22px;margin-bottom:24px;display:flex;gap:16px;align-items:flex-start}
.intro-icon{width:44px;height:44px;border-radius:12px;background:rgba(0,184,148,.15);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.intro h2{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--text)}
.intro p{font-size:13px;color:var(--text2);line-height:1.7}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:20px;overflow-x:auto}
.tab{padding:12px 20px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit;font-weight:600;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text)}
.tab.active.t-a{border-bottom-color:var(--green)}
.tab.active.t-d{border-bottom-color:var(--amber)}
.tab.active.t-x{border-bottom-color:var(--red)}
.tab.active.t-p{border-bottom-color:var(--text3)}
.tab .tn{font-weight:700;font-size:14px;padding:1px 8px;border-radius:10px;background:var(--bg3)}
.tab.t-a.active .tn{background:var(--green-bg);color:var(--green)}
.tab.t-d.active .tn{background:var(--amber-bg);color:var(--amber)}
.tab.t-x.active .tn{background:var(--red-bg);color:var(--red)}

.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;color:var(--text3);margin-right:4px}
.filter-btn{padding:4px 12px;border-radius:14px;font-size:11px;border:1px solid var(--brd);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .15s}
.filter-btn:hover{color:var(--text)}
.filter-btn.active{background:var(--accent);color:white;border-color:var(--accent)}

.list{display:flex;flex-direction:column;gap:10px}
.item{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:14px 18px;display:flex;align-items:flex-start;gap:14px;transition:all .15s}
.item:hover{border-color:var(--brd);background:var(--bg3)}
.item-badge{padding:2px 10px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:3px}
.item-badge.a{background:var(--green-bg);color:var(--green)}
.item-badge.d{background:var(--amber-bg);color:var(--amber)}
.item-badge.x{background:var(--red-bg);color:var(--red)}
.item-badge.p{background:rgba(139,149,168,.1);color:var(--text3)}
.item-body{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.5}
.item-meta{font-size:11px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.item-page{color:var(--accent-l);font-weight:600}
.item-ver{font-size:10px;padding:1px 7px;border-radius:4px;background:rgba(251,191,36,.12);color:#fbbf24;font-weight:500;margin-left:6px;vertical-align:2px;font-family:monospace}
.item-outdated{font-size:10px;color:#f87171;padding:1px 7px;border-radius:4px;background:rgba(248,113,113,.08);font-weight:500}
.item-note{font-size:12px;color:var(--text2);line-height:1.6;padding:6px 10px;background:rgba(255,255,255,.02);border-radius:6px;margin-top:6px;border-left:2px solid var(--brd)}
.item-link{padding:5px 12px;border-radius:6px;background:var(--bg3);color:var(--accent-l);font-size:11px;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:all .15s;border:1px solid var(--brd)}
.item-link:hover{background:var(--accent);color:white;border-color:var(--accent)}

.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty h3{font-size:15px;margin-bottom:8px;color:var(--text2)}
.empty p{font-size:13px;line-height:1.8}

.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px}
.loading::before{content:'';display:inline-block;width:16px;height:16px;border:2px solid var(--brd);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:-3px}
@keyframes spin{to{transform:rotate(360deg)}}

.stats-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:16px;text-align:center}
.stat-n{font-size:28px;font-weight:700;margin-bottom:4px}
.stat-n.g{color:var(--green)}.stat-n.a{color:var(--amber)}.stat-n.r{color:var(--red)}.stat-n.p{color:var(--text2)}
.stat-l{font-size:11px;color:var(--text3)}

.page-group{margin-bottom:24px}
.page-group-title{font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.page-group-title .pg-count{font-size:11px;font-weight:600;color:var(--text3);background:var(--bg3);padding:1px 8px;border-radius:8px;margin-left:auto}

.refresh-btn{padding:6px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--brd);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;margin-left:auto;transition:all .15s}
.refresh-btn:hover{background:var(--bg4);color:var(--text)}
</style>
</head>
<body>

<div class="header">
  <h1>⭐ 决策面板 <span class="badge">实时同步</span></h1>
  <div style="margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <button class="refresh-btn" onclick="pushLocalToSupabase()" title="把本地localStorage的反馈一次性推送到Supabase（首次迁移用）" style="background:rgba(52,211,153,.15);color:#34d399;border-color:rgba(52,211,153,.4)">☁ 推送本地到后端</button>
    <button class="refresh-btn" onclick="exportFeedback()" title="导出本地反馈为 JSON 文件">⬇ 导出</button>
    <button class="refresh-btn" onclick="importFeedback()" title="从 JSON 文件导入反馈">⬆ 导入</button>
    <button class="refresh-btn" onclick="loadAll()" title="重新加载">↻ 刷新</button>
    <button class="refresh-btn" onclick="clearAllFeedback()" title="清空所有反馈" style="color:#f87171">🗑 清空</button>
  </div>
</div>

<div style="max-width:960px;margin:12px auto 0;padding:0 16px">
  <div id="sync-info" style="font-size:12px;color:var(--text3);padding:8px 14px;background:var(--bg2);border-radius:8px;border:1px solid var(--brd)">
    检查团队同步状态中...
  </div>
</div>

<div class="main">

<div class="intro">
  <div class="intro-icon">⭐</div>
  <div>
    <h2>单一真相源 · 自动聚合CEO反馈</h2>
    <p>本页面根据你在各页面标注的反馈（同意/讨论/不同意）自动聚合，<strong style="color:var(--green)">无需手动维护</strong>。每次在任何页面点反馈按钮，这里下次加载时自动更新。<br>
    <span style="font-size:12px;color:var(--text3)">推荐工作流：① 看"待反馈"→ 逐一审视 · ② 看"已确认"→ 告诉团队可以开发 · ③ 看"待讨论"→ 整理会议议题<br>
    数据来源：浏览器本地存储（每个设备独立）。换设备看不到之前的反馈。</span></p>
  </div>
</div>

<div class="stats-summary">
  <div class="stat-card"><div class="stat-n g" id="s-a">—</div><div class="stat-l">✓ 已确认决策</div></div>
  <div class="stat-card"><div class="stat-n a" id="s-d">—</div><div class="stat-l">💬 待讨论事项</div></div>
  <div class="stat-card"><div class="stat-n r" id="s-x">—</div><div class="stat-l">✗ 已否决方案</div></div>
  <div class="stat-card"><div class="stat-n p" id="s-p">—</div><div class="stat-l">⬜ 待反馈板块</div></div>
</div>

<details style="margin-bottom:20px">
  <summary style="cursor:pointer;font-size:12px;color:var(--text3);padding:8px 12px;background:var(--bg2);border-radius:8px;border:1px solid var(--brd);user-select:none">🔍 数据源诊断（点击查看 localStorage 原始数据）</summary>
  <div id="diag-panel" style="margin-top:10px;padding:12px 14px;background:var(--bg2);border-radius:8px;border:1px solid var(--brd);font-size:11px;font-family:monospace;color:var(--text2);max-height:300px;overflow:auto"></div>
</details>

<div class="tabs">
  <button class="tab t-a active" data-tab="a" onclick="showTab('a',this)"><span>已确认</span><span class="tn" id="tn-a">0</span></button>
  <button class="tab t-d" data-tab="d" onclick="showTab('d',this)"><span>待讨论</span><span class="tn" id="tn-d">0</span></button>
  <button class="tab t-x" data-tab="x" onclick="showTab('x',this)"><span>已否决</span><span class="tn" id="tn-x">0</span></button>
  <button class="tab t-p" data-tab="p" onclick="showTab('p',this)"><span>待反馈</span><span class="tn" id="tn-p">0</span></button>
</div>

<div class="filter-bar" id="page-filter">
  <span class="filter-label">按页面筛选：</span>
  <button class="filter-btn active" data-page="all" onclick="filterPage('all',this)">全部</button>
</div>

<div id="content">
  <div class="loading">加载反馈数据中...</div>
</div>

</div>

<script type="module" src="/sb.js"></script>
<script src="/nav.js"></script>
<script>
const PAGES = [
  { key:'chatA', letter:'A', name:'信任与安全感', url:'chatA.html' },
  { key:'chatB', letter:'B', name:'空状态+反馈闭环', url:'chatB.html' },
  { key:'chatC', letter:'C', name:'卡片+金额感知', url:'chatC.html' },
  { key:'chatD', letter:'D', name:'确认+留存+异常', url:'chatD.html' },
  { key:'chatE', letter:'E', name:'AI资产确权', url:'chatE.html' },
  { key:'chatF', letter:'F', name:'裂变增长·任务体系', url:'chatF.html' },
  { key:'chatG', letter:'G', name:'任务品类·UI规范', url:'chatG.html' },
  { key:'chatH', letter:'H', name:'AI自动审核流程', url:'chatH.html' },
  { key:'architecture', letter:'架', name:'界面架构方案', url:'architecture.html' },
  { key:'product-spec', letter:'规', name:'产品规格文档', url:'product-spec.html' },
];

let ALL_ITEMS = [];
let CURRENT_TAB = 'a';
let CURRENT_PAGE = 'all';

async function loadAll() {
  document.getElementById('content').innerHTML = '<div class="loading">加载反馈数据中...</div>';
  ALL_ITEMS = [];
  
  // Helper: parse version string for comparison
  function parseVer(v) {
    return String(v || '1').split('.').map(function(n){ return parseInt(n,10) || 0; });
  }
  function compareVer(a, b) {
    var pa = parseVer(a), pb = parseVer(b);
    var len = Math.max(pa.length, pb.length);
    for (var i = 0; i < len; i++) {
      var x = pa[i] || 0, y = pb[i] || 0;
      if (x < y) return -1;
      if (x > y) return 1;
    }
    return 0;
  }
  
  // Lazy migration: convert old flat format to new nested format
  function migrateKey(key) {
    var raw;
    try { raw = localStorage.getItem(key); } catch(e) { return {}; }
    if (!raw) return {};
    var data;
    try { data = JSON.parse(raw); } catch(e) { return {}; }
    if (!data || typeof data !== 'object') return {};
    if (data._v === 2) return data;
    
    var migrated = { _v: 2 };
    Object.keys(data).forEach(function(k) {
      if (k === '_v') return;
      var val = data[k];
      if (!val || typeof val !== 'object') return;
      
      // Check if already nested (version keys as children)
      var keys = Object.keys(val);
      var looksNew = keys.length > 0 && keys.every(function(vk){
        return /^\d+(\.\d+)*$/.test(vk) && val[vk] && typeof val[vk] === 'object';
      });
      if (looksNew) { migrated[k] = val; return; }
      
      // Old format: extract id and version from key
      var m = k.match(/^(.+)\.v(\d+(?:\.\d+)*)$/);
      var id, ver;
      if (m) { id = m[1]; ver = m[2]; }
      else   { id = k; ver = '1'; }
      if (!migrated[id]) migrated[id] = {};
      migrated[id][ver] = {
        c: val.c || null,
        n: val.n || '',
        t: val.t || new Date().toISOString()
      };
    });
    try { localStorage.setItem(key, JSON.stringify(migrated)); } catch(e){}
    return migrated;
  }
  
  // Merge remote feedback-synced.json into localStorage (newer wins)
  async function mergeFromRemote() {
    try {
      const res = await fetch('/feedback-synced.json', { cache: 'no-store' });
      if (!res.ok) return null;
      const remote = await res.json();
      if (!remote || !remote.pages) return null;
      
      const PAGE_KEY_MAP = {
        chatA: 'msc_ceo_feedback', chatB: 'msc_b_fb', chatC: 'msc_c_fb',
        chatD: 'msc_d_fb', chatE: 'msc_e_fb', chatF: 'msc_f_fb',
        chatG: 'msc_g_fb', chatH: 'msc_h_fb',
        architecture: 'msc_arch_fb', 'product-spec': 'msc_ps_fb'
      };
      
      Object.keys(remote.pages).forEach(pageKey => {
        const storageKey = PAGE_KEY_MAP[pageKey];
        if (!storageKey) return;
        const remotePageData = remote.pages[pageKey];
        let local = {};
        try { local = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch(e){}
        const merged = Object.assign({ _v: 2 }, local);
        Object.keys(remotePageData).forEach(id => {
          if (id === '_v') return;
          const remoteSection = remotePageData[id];
          if (!remoteSection || typeof remoteSection !== 'object') return;
          if (!merged[id]) merged[id] = {};
          Object.keys(remoteSection).forEach(ver => {
            const rfb = remoteSection[ver];
            if (!rfb || typeof rfb !== 'object') return;
            const lfb = merged[id][ver];
            if (!lfb) {
              merged[id][ver] = rfb;
            } else {
              const lt = lfb.t ? Date.parse(lfb.t) : 0;
              const rt = rfb.t ? Date.parse(rfb.t) : 0;
              if (rt > lt) merged[id][ver] = rfb;
            }
          });
        });
        localStorage.setItem(storageKey, JSON.stringify(merged));
      });
      
      return remote._synced_at || null;
    } catch(e) {
      return null;
    }
  }
  
  // Wait for Supabase (timeout 3s → offline mode)
  function waitForSB() {
    return new Promise(function(resolve) {
      if (window.MSC_SB) { resolve(window.MSC_SB); return; }
      var timeout = setTimeout(function() { resolve(null); }, 3000);
      window.addEventListener('msc-sb-ready', function() {
        clearTimeout(timeout);
        resolve(window.MSC_SB);
      }, { once: true });
    });
  }
  
  try {
    // FIRST: pull all feedback from Supabase (authoritative team state)
    const sb = await waitForSB();
    let syncedFromDB = false;
    if (sb) {
      try {
        const rows = await sb.fetchAll();  // fetch ALL pages
        if (rows && rows.length > 0) {
          // Merge into localStorage per page
          const pageKeys = {
            chatA: 'msc_ceo_feedback', chatB: 'msc_b_fb', chatC: 'msc_c_fb',
            chatD: 'msc_d_fb', chatE: 'msc_e_fb', chatF: 'msc_f_fb',
            chatG: 'msc_g_fb', chatH: 'msc_h_fb',
            architecture: 'msc_arch_fb', 'product-spec': 'msc_ps_fb'
          };
          const byPage = {};
          rows.forEach(r => {
            if (!byPage[r.page_key]) byPage[r.page_key] = [];
            byPage[r.page_key].push(r);
          });
          Object.keys(byPage).forEach(pageKey => {
            const storageKey = pageKeys[pageKey];
            if (!storageKey) return;
            let local = {};
            try { local = JSON.parse(localStorage.getItem(storageKey) || '{"_v":2}'); } catch(e) { local = {_v:2}; }
            if (local._v !== 2) local = { _v: 2 };
            byPage[pageKey].forEach(r => {
              if (!local[r.section_id]) local[r.section_id] = {};
              const remoteObj = { c: r.choice, n: r.note || '', t: r.updated_at };
              const localRow = local[r.section_id][r.version];
              if (!localRow) { local[r.section_id][r.version] = remoteObj; return; }
              const lt = localRow.t ? Date.parse(localRow.t) : 0;
              const rt = remoteObj.t ? Date.parse(remoteObj.t) : 0;
              if (rt > lt) local[r.section_id][r.version] = remoteObj;
            });
            localStorage.setItem(storageKey, JSON.stringify(local));
          });
          syncedFromDB = true;
        }
      } catch(e) { console.warn('Supabase fetch failed:', e); }
    }
    
    // Legacy: also try the git-based feedback-synced.json
    const syncedAt = await mergeFromRemote();
    
    // Update sync status indicator
    const syncInfo = document.getElementById('sync-info');
    if (syncInfo) {
      if (syncedFromDB) {
        syncInfo.innerHTML = `🟢 <strong>实时同步已连接</strong> · Supabase 后端 · 任何人给反馈都会几秒内同步到这里`;
        syncInfo.style.color = '#34d399';
      } else if (syncedAt) {
        const d = new Date(syncedAt);
        const iso = d.toISOString().slice(0,16).replace('T',' ');
        syncInfo.innerHTML = `🟡 <strong>Git 同步</strong>（Supabase 未连接）· 最后推送: ${iso} UTC`;
        syncInfo.style.color = '#fbbf24';
      } else {
        syncInfo.innerHTML = `⚪ <strong>离线模式</strong>（Supabase 未连接 + 无 Git 同步数据）· 仅显示本浏览器反馈`;
        syncInfo.style.color = '#6B7084';
      }
    }
    
    // Load feedback data from localStorage with lazy migration
    const feedbackData = {};
    PAGES.forEach(page => {
      const letter = page.letter.toLowerCase();
      const storageKey = page.key === 'architecture' ? 'msc_arch_fb' 
                      : page.key === 'product-spec' ? 'msc_ps_fb'
                      : page.key === 'chatA' ? 'msc_ceo_feedback'
                      : `msc_${letter}_fb`;
      feedbackData[page.key] = migrateKey(storageKey);
    });
    
    for (const page of PAGES) {
      try {
        const html = await (await fetch('/' + page.url)).text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const fbs = doc.querySelectorAll('.fb[data-id]');
        const pageFb = feedbackData[page.key] || {};
        
        fbs.forEach(fb => {
          const id = fb.dataset.id;
          const ver = fb.dataset.ver || '1';
          const changelog = fb.dataset.changelog || '';
          
          // Extract section title and description from DOM
          let sectionTitle = '';
          let sectionId = '';
          const section = fb.closest('.section');
          const card = fb.closest('.card');
          if (card) {
            const cm = card.querySelector('.card-head .cm, .card-name');
            const cn = card.querySelector('.card-head .cn, .card-num');
            sectionTitle = (cn?.textContent?.trim() || '') + ' ' + (cm?.textContent?.trim() || '');
          }
          if (section && !sectionTitle.trim()) {
            const sh = section.querySelector('.section-head, .section-name');
            if (sh) sectionTitle = sh.textContent.trim().substring(0, 60);
          }
          if (section && section.id) sectionId = section.id;
          
          // Description comes from data-desc attribute or old .fb-d content
          let desc = fb.dataset.desc || '';
          if (!desc) {
            const descEl = fb.querySelector('.fb-d');
            if (descEl) desc = descEl.textContent.trim();
          }
          if (!sectionTitle.trim()) sectionTitle = desc.substring(0, 50) || id;
          
          // Read feedback for current version
          const versionsData = pageFb[id] || {};
          const currentFb = versionsData[ver] || {};
          const anchor = sectionId ? '#' + sectionId : '';
          
          // Determine status: current version's choice, or 'p' if pending
          const status = currentFb.c || 'p';
          
          // Check if there are older versions with feedback
          const allVersions = Object.keys(versionsData).filter(v => {
            return versionsData[v] && (versionsData[v].c || versionsData[v].n);
          });
          const olderVersionsWithFb = allVersions.filter(v => compareVer(v, ver) < 0);
          const hasOutdatedFb = olderVersionsWithFb.length > 0 && !currentFb.c;
          
          ALL_ITEMS.push({
            id: id,
            ver: ver,
            changelog: changelog,
            page_key: page.key,
            page_letter: page.letter,
            page_name: page.name,
            page_url: page.url + anchor,
            section_title: sectionTitle.trim(),
            description: desc,
            status: status,
            note: currentFb.n || '',
            timestamp: currentFb.t || '',
            has_outdated: hasOutdatedFb,
            outdated_vers: olderVersionsWithFb
          });
        });
      } catch(err) {
        console.error('Failed to load', page.url, err);
      }
    }
    
    updateStats();
    buildPageFilter();
    render();
    updateDiagnostic();
    // Subscribe to realtime changes so decisions panel stays live
    if (sb && !window._MSC_SUB) {
      window._MSC_SUB = sb.subscribe(function(payload) {
        // Any feedback change → reload everything (simple, reliable)
        console.log('[Decisions] Realtime update:', payload);
        // Brief visual nudge
        const syncInfo = document.getElementById('sync-info');
        if (syncInfo) {
          const prev = syncInfo.innerHTML;
          syncInfo.innerHTML = `🔄 <strong>收到新反馈</strong> · 正在刷新...`;
          syncInfo.style.color = '#60a5fa';
          setTimeout(() => loadAll(), 400);
        } else {
          loadAll();
        }
      });
    }
    
  } catch(err) {
    document.getElementById('content').innerHTML = '<div class="empty"><h3>加载失败</h3><p>无法读取反馈数据。请刷新页面重试。</p></div>';
    console.error(err);
  }
}

function updateDiagnostic() {
  const diag = document.getElementById('diag-panel');
  if (!diag) return;
  const keys = ['msc_ceo_feedback','msc_a_fb','msc_b_fb','msc_c_fb','msc_d_fb','msc_e_fb','msc_f_fb','msc_g_fb','msc_h_fb','msc_arch_fb','msc_ps_fb'];
  let html = '';
  let totalEntries = 0;
  keys.forEach(k => {
    const raw = localStorage.getItem(k);
    if (!raw) {
      html += `<div style="opacity:.4">${k}: <em>empty</em></div>`;
      return;
    }
    try {
      const data = JSON.parse(raw);
      const entries = Object.keys(data).filter(x => x !== '_v').length;
      totalEntries += entries;
      const isV2 = data._v === 2;
      html += `<div><strong style="color:${isV2 ? 'var(--green)' : '#fbbf24'}">${k}</strong> · ${entries} 条 · 格式: ${isV2 ? 'v2 (nested)' : 'v1 (flat, will migrate)'}</div>`;
    } catch(e) {
      html += `<div style="color:#f87171">${k}: JSON 解析失败</div>`;
    }
  });
  const sbStatus = window.MSC_SB ? `<div style="color:var(--green);margin-top:6px">☁ Supabase 客户端：已连接</div>` : `<div style="color:#f87171;margin-top:6px">☁ Supabase 客户端：未连接（离线模式）</div>`;
  html = `<div style="margin-bottom:8px;color:var(--text);font-weight:600">总计 ${totalEntries} 条反馈跨 ${keys.filter(k=>localStorage.getItem(k)).length} 个页面</div>` + html + sbStatus;
  diag.innerHTML = html;
}

// Export all feedback data as JSON file download
function exportFeedback() {
  const pages = [
    ['chatA','msc_ceo_feedback'],['chatB','msc_b_fb'],['chatC','msc_c_fb'],
    ['chatD','msc_d_fb'],['chatE','msc_e_fb'],['chatF','msc_f_fb'],
    ['chatG','msc_g_fb'],['chatH','msc_h_fb'],
    ['architecture','msc_arch_fb'],['product-spec','msc_ps_fb']
  ];
  const all = { _exported: new Date().toISOString(), pages: {} };
  pages.forEach(([p, key]) => {
    try {
      const raw = localStorage.getItem(key);
      if (raw) all.pages[p] = JSON.parse(raw);
    } catch(e) {}
  });
  const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `msc-feedback-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

// Import feedback from JSON file (merges into localStorage)
function importFeedback() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.pages) throw new Error('格式不对：缺少 pages 字段');
      const pageKeys = {
        chatA: 'msc_ceo_feedback', chatB: 'msc_b_fb', chatC: 'msc_c_fb',
        chatD: 'msc_d_fb', chatE: 'msc_e_fb', chatF: 'msc_f_fb',
        chatG: 'msc_g_fb', chatH: 'msc_h_fb',
        architecture: 'msc_arch_fb', 'product-spec': 'msc_ps_fb'
      };
      let merged = 0;
      Object.keys(data.pages).forEach(p => {
        const key = pageKeys[p];
        if (!key) return;
        localStorage.setItem(key, JSON.stringify(data.pages[p]));
        merged++;
      });
      alert(`✓ 已导入 ${merged} 个页面的反馈数据。正在刷新...`);
      location.reload();
    } catch(err) {
      alert('❌ 导入失败：' + err.message);
    }
  };
  input.click();
}

// Push all localStorage feedback to Supabase (one-time migration)
async function pushLocalToSupabase(event) {
  if (!window.MSC_SB) {
    alert('❌ Supabase 客户端未就绪。打开 DevTools Console 看报错。');
    return;
  }
  if (!confirm('确认把本地 localStorage 的反馈推送到 Supabase 后端？\n\n这会 upsert 所有本地反馈到云端。如果云端有更新数据，按时间戳比较较新的保留。继续？')) return;
  
  const pageKeys = {
    chatA: 'msc_ceo_feedback', chatB: 'msc_b_fb', chatC: 'msc_c_fb',
    chatD: 'msc_d_fb', chatE: 'msc_e_fb', chatF: 'msc_f_fb',
    chatG: 'msc_g_fb', chatH: 'msc_h_fb',
    architecture: 'msc_arch_fb', 'product-spec': 'msc_ps_fb'
  };
  
  const rows = [];
  Object.entries(pageKeys).forEach(([pageKey, storageKey]) => {
    try {
      const data = JSON.parse(localStorage.getItem(storageKey) || '{}');
      if (!data || typeof data !== 'object') return;
      Object.keys(data).forEach(sectionId => {
        if (sectionId === '_v') return;
        const versions = data[sectionId];
        if (!versions || typeof versions !== 'object') return;
        const keys = Object.keys(versions);
        const isNested = keys.length > 0 && keys.every(k => /^\d+(\.\d+)*$/.test(k));
        if (isNested) {
          keys.forEach(ver => {
            const fb = versions[ver];
            if (!fb || (!fb.c && !fb.n)) return;
            rows.push({ page_key: pageKey, section_id: sectionId, version: ver, choice: fb.c, note: fb.n || '' });
          });
        } else if (versions.c || versions.n) {
          rows.push({ page_key: pageKey, section_id: sectionId, version: '1', choice: versions.c, note: versions.n || '' });
        }
      });
    } catch(e) {}
  });
  
  if (rows.length === 0) { alert('本地没有反馈数据可推送。'); return; }
  
  const btn = event && event.target;
  const origText = btn ? btn.textContent : '';
  if (btn) { btn.textContent = `☁ 推送中 (0/${rows.length})...`; btn.disabled = true; }
  
  let ok = 0, fail = 0;
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    try {
      const result = await window.MSC_SB.upsert(r.page_key, r.section_id, r.version, r.choice, r.note);
      if (result) ok++; else fail++;
    } catch(e) { fail++; console.warn('Upsert failed:', r, e); }
    if (btn) btn.textContent = `☁ 推送中 (${i+1}/${rows.length})...`;
  }
  
  if (btn) { btn.textContent = origText; btn.disabled = false; }
  alert(`✓ 推送完成：${ok} 条成功，${fail} 条失败。正在刷新...`);
  loadAll();
}

function clearAllFeedback() {
  if (!confirm('确认清空所有反馈？此操作不可撤销。建议先导出备份。')) return;
  const keys = ['msc_ceo_feedback','msc_b_fb','msc_c_fb','msc_d_fb','msc_e_fb','msc_f_fb','msc_g_fb','msc_h_fb','msc_arch_fb','msc_ps_fb'];
  keys.forEach(k => localStorage.removeItem(k));
  location.reload();
}

function updateStats() {
  const counts = { a: 0, d: 0, x: 0, p: 0 };
  ALL_ITEMS.forEach(i => counts[i.status]++);
  document.getElementById('s-a').textContent = counts.a;
  document.getElementById('s-d').textContent = counts.d;
  document.getElementById('s-x').textContent = counts.x;
  document.getElementById('s-p').textContent = counts.p;
  document.getElementById('tn-a').textContent = counts.a;
  document.getElementById('tn-d').textContent = counts.d;
  document.getElementById('tn-x').textContent = counts.x;
  document.getElementById('tn-p').textContent = counts.p;
}

function buildPageFilter() {
  const filterBar = document.getElementById('page-filter');
  const existingBtns = filterBar.querySelectorAll('.filter-btn');
  existingBtns.forEach((btn, i) => { if (i > 0) btn.remove(); });
  
  const pageCounts = {};
  ALL_ITEMS.forEach(i => {
    pageCounts[i.page_key] = (pageCounts[i.page_key] || 0) + 1;
  });
  
  PAGES.forEach(p => {
    if (pageCounts[p.key]) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.page = p.key;
      btn.onclick = () => filterPage(p.key, btn);
      btn.textContent = `${p.letter} · ${p.name}`;
      filterBar.appendChild(btn);
    }
  });
}

function showTab(tab, btn) {
  CURRENT_TAB = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterPage(pageKey, btn) {
  CURRENT_PAGE = pageKey;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  let items = ALL_ITEMS.filter(i => i.status === CURRENT_TAB);
  // In "待反馈" (p) tab, also include items that have outdated feedback (content updated, needs re-review)
  if (CURRENT_TAB === 'p') {
    const outdated = ALL_ITEMS.filter(i => i.has_outdated && i.status === 'p');
    // Already included since status==='p' for items without current feedback
  }
  if (CURRENT_PAGE !== 'all') {
    items = items.filter(i => i.page_key === CURRENT_PAGE);
  }
  
  const container = document.getElementById('content');
  
  if (items.length === 0) {
    const emptyMsg = {
      a: { title: '暂无已确认决策', p: '当CEO在任何页面点✓同意时，决策会自动出现在这里' },
      d: { title: '暂无待讨论事项', p: '所有讨论中的话题会自动聚合在这里' },
      x: { title: '暂无否决方案', p: '已否决的设计会保留在此作为历史参考' },
      p: { title: '所有板块都已给反馈 👏', p: '每个板块都有CEO表态了，赞' }
    }[CURRENT_TAB];
    container.innerHTML = `<div class="empty"><h3>${emptyMsg.title}</h3><p>${emptyMsg.p}</p></div>`;
    return;
  }
  
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.page_key]) grouped[item.page_key] = [];
    grouped[item.page_key].push(item);
  });
  
  let html = '';
  PAGES.forEach(page => {
    if (!grouped[page.key]) return;
    const pageItems = grouped[page.key];
    html += `<div class="page-group">
      <div class="page-group-title">${page.letter} · ${page.name}<span class="pg-count">${pageItems.length}</span></div>
      <div class="list">`;
    pageItems.forEach(item => {
      const badgeText = { a: '✓ 同意', d: '💬 讨论', x: '✗ 不同意', p: '⬜ 待反馈' }[item.status];
      const noteHtml = item.note ? `<div class="item-note">"${escapeHtml(item.note)}"</div>` : '';
      
      // Version tag
      const verHtml = `<span class="item-ver">v${item.ver}</span>`;
      
      // "Content updated" indicator
      let outdatedHtml = '';
      if (item.has_outdated) {
        const prevVers = item.outdated_vers.join(', v');
        outdatedHtml = `<span class="item-outdated">⚡ 内容已更新 (旧版: v${prevVers})</span>`;
      }
      
      // Date
      const dateHtml = item.timestamp ? 
        `<span>${new Date(item.timestamp).toISOString().slice(0,10)}</span>` : '';
      
      html += `<div class="item">
        <span class="item-badge ${item.status}">${badgeText}</span>
        <div class="item-body">
          <div class="item-title">${escapeHtml(item.section_title || item.description)} ${verHtml}</div>
          <div class="item-meta">
            ${escapeHtml(item.description) ? `<span>${escapeHtml(item.description)}</span>` : ''}
            ${outdatedHtml}
            ${dateHtml ? `<span style="color:var(--text3)">·</span>${dateHtml}` : ''}
            <span style="color:var(--text3)">·</span>
            <span>ID: <code style="font-family:monospace;font-size:10px;color:var(--text3)">${item.id}</code></span>
          </div>
          ${noteHtml}
        </div>
        <a class="item-link" href="/${item.page_url}" target="_blank">查看原设计 →</a>
      </div>`;
    });
    html += '</div></div>';
  });
  
  container.innerHTML = html;
}

function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

loadAll();
</script>
