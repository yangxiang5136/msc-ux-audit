<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小程序改稿 · 列表 · MSC.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wxapp.css">
</head>
<body data-wxapp-page="list">

<main class="wp-main">
  <div class="wp-page-head">
    <h1>小程序改稿列表</h1>
    <p>Sean / UIUX / 工程师 / CEO 四方协作 · 改稿、批注、表态、决策都在这里</p>
  </div>

  <div class="wp-stats" id="wp-stats"></div>

  <div class="wp-filters">
    <div class="wp-filter-group">
      <label>状态</label>
      <button class="wp-chip active" data-status="*">全部</button>
      <button class="wp-chip" data-status="draft">草稿</button>
      <button class="wp-chip" data-status="review">评审中</button>
      <button class="wp-chip" data-status="accepted">已采纳</button>
      <button class="wp-chip" data-status="rejected">已拒绝</button>
      <button class="wp-chip" data-status="shipped">已开发</button>
    </div>
    <div class="wp-filter-group">
      <label>作者</label>
      <button class="wp-chip active" data-role="*">全部</button>
      <button class="wp-chip" data-role="sean">Sean</button>
      <button class="wp-chip" data-role="uiux">UIUX</button>
      <button class="wp-chip" data-role="eng">工程</button>
      <button class="wp-chip" data-role="ceo">CEO</button>
    </div>
    <input id="wp-search" class="wp-search" type="search" placeholder="搜索标题 / slug / 理由…">
    <button id="wp-btn-new" class="wp-btn-primary">＋ 新建改稿</button>
  </div>

  <div class="wp-grid" id="wp-grid"></div>
</main>

<script src="wxapp.js"></script>
</body>
</html>
